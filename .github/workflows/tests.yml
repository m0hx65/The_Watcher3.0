name: tests

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only checks out the repo and runs tests — it
# never writes to the repo, so the GITHUB_TOKEN gets read-only content access.
permissions:
  contents: read

jobs:
  offline-suites:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run offline test suites
        run: python scripts/run_tests.py
