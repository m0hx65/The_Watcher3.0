services:
  - type: web
    name: the-watcher
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: IG_SESSION_COOKIE
        sync: false
      - key: IG_PROXY_URL
        value: "https://ig-proxy.m-asaad2005-ma.workers.dev"
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_WEBHOOK_PATH
        value: "/telegram/webhook"
      - key: CHECK_INTERVAL
        value: "1800"
      - key: JITTER_SECONDS
        value: "120"
      - key: REQUEST_TIMEOUT
        value: "20"
      - key: MAX_CONCURRENT_FETCHES
        value: "3"
      # Stakeout floor stays above the 90s reel cache so high-frequency
      # single-target watches never hammer Instagram into 401s.
      - key: STAKEOUT_MIN_INTERVAL
        value: "120"
      # Went-dark radar: alert after this many quiet days. 0 disables.
      - key: DARK_RADAR_DAYS
        value: "3"
      # Per-account forum topics. Set to "true" when running in a Topics-enabled
      # group with the bot as admin (Manage topics) to give each account its own
      # thread. Default off → everything posts to one chat / General.
      - key: TELEGRAM_FORUM_TOPICS
        value: "false"
      - key: MEDIA_DIR
        value: "/app/data/media"
      - key: LOG_LEVEL
        value: "INFO"
      - key: WEB_API_TOKEN
        generateValue: true
      # External Postgres (Neon free tier — does NOT expire, unlike Render's
      # free database). Set this in the Render dashboard to your Neon connection
      # string; it can be pasted verbatim (sslmode/channel_binding params and
      # the postgres:// prefix are normalized for asyncpg by app.db_url).
      - key: DATABASE_URL
        sync: false
