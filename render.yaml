services:
  - type: web
    name: the-watcher
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_WEBHOOK_PATH
        value: "/telegram/webhook"
      - key: CHECK_INTERVAL
        value: "1800"
      - key: JITTER_SECONDS
        value: "120"
      - key: REQUEST_TIMEOUT
        value: "20"
      - key: MAX_CONCURRENT_FETCHES
        value: "3"
      - key: MEDIA_DIR
        value: "/app/data/media"
      - key: LOG_LEVEL
        value: "INFO"
      - key: WEB_API_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: watcher-db
          property: connectionString

databases:
  - name: watcher-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
